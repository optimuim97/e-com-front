# ══════════════════════════════════════════════════════════════════════
# Rosa Beauty — Déploiement automatique sur push
#
# Déclenche `deploy.sh` sur le VPS via SSH dès qu'on push sur main.
# Le script pull les 2 sous-repos (commerce + commerce-front),
# rebuild les images Docker, redémarre les containers, joue les migrations.
#
# Secrets requis dans GitHub → Settings → Secrets → Actions :
#   - VPS_HOST   : ex. vps120941.softara.tech (ou IP)
#   - VPS_USER   : ex. root
#   - VPS_SSH_KEY: clé privée OpenSSH (cat ~/.ssh/id_ed25519)
#   - VPS_PORT   : optionnel, défaut 22
#   - DEPLOY_PATH: optionnel, défaut /var/www/rosabeauty
# ══════════════════════════════════════════════════════════════════════
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:        # permet de déclencher manuellement depuis l'UI GitHub

concurrency:
  group: prod-deploy        # évite 2 déploiements en parallèle
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/rosabeauty' }}
        run: |
          ssh -p "$VPS_PORT" -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" bash -se <<'EOF'
            set -e
            cd "${DEPLOY_PATH:-/var/www/rosabeauty}"
            echo "[CI] Triggered by frontend push — running deploy.sh"
            bash deploy.sh
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_ed25519
