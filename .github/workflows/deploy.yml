# ══════════════════════════════════════════════════════════════════════
# Déploiement automatique sur push (frontend)
#
# Déclenche deploy.sh sur le VPS via SSH. Le script pull les 2 sous-repos,
# rebuild les images Docker, redémarre les containers, joue les migrations.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   VPS_HOST    ex. vps120941.softara.tech (ou IP)
#   VPS_USER    ex. root
#   VPS_SSH_KEY clé privée OpenSSH complète (contenu de ~/.ssh/id_ed25519)
#   VPS_PORT    optionnel, défaut 22
# ══════════════════════════════════════════════════════════════════════
name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/rosabeauty
            echo "[CI] frontend push — running deploy.sh"
            bash deploy.sh
